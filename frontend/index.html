<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/hosp.svg" />

    <!-- Primary SEO -->
    <title>HospitalSync — Hospital Queue & Bed Management System</title>
    <meta name="description" content="HospitalSync is a real-time hospital management portal for tracking patient queues, bed occupancy, department congestion, and staff availability — powered by queuing theory analytics." />
    <meta name="keywords" content="hospital management system, patient queue management, bed occupancy tracker, department congestion, inpatient outpatient management, hospital ERP, queuing theory, HospitalSync" />
    <meta name="author" content="HospitalSync" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hospitalsync.app/" />

    <!-- Theme Color (browser UI accent) -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hospitalsync.app/" />
    <meta property="og:title" content="HospitalSync — Hospital Queue & Bed Management System" />
    <meta property="og:description" content="Real-time hospital management: track patient queues, bed occupancy, department congestion, and staff shift status — all in one portal." />
    <meta property="og:image" content="https://hospitalsync.app/og-preview.png" />
    <meta property="og:site_name" content="HospitalSync" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HospitalSync — Hospital Queue & Bed Management System" />
    <meta name="twitter:description" content="Real-time hospital management: track patient queues, bed occupancy, department congestion, and staff shift status — all in one portal." />
    <meta name="twitter:image" content="https://hospitalsync.app/og-preview.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "HospitalSync",
      "url": "https://hospitalsync.app/",
      "description": "A multi-tenant hospital management and queue prediction system with real-time bed occupancy tracking, department congestion analytics, and staff management.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
